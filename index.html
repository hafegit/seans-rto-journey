<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sean's RTO Journey</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0e13;
            color: #e7e9ea;
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
        }

        #header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(10, 14, 19, 0.88);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #header h1 {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #f0f0f0;
        }

        #header .subtitle {
            font-size: 0.72rem;
            color: #6b7280;
            font-weight: 400;
            margin-top: 1px;
        }

        #progress-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(16, 185, 129, 0.08);
            border: 1px solid rgba(16, 185, 129, 0.25);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 0.78rem;
            font-weight: 500;
            color: #10b981;
        }

        #progress-badge .count {
            font-weight: 700;
            font-size: 0.9rem;
        }

        #map {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1;
        }

        /* Dark overlay on the satellite imagery */
        .dark-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(5, 10, 18, 0.55);
            z-index: 2;
            pointer-events: none;
        }

        /* Legend */
        #legend {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(10, 14, 19, 0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 14px 18px;
            font-size: 0.75rem;
        }

        #legend h3 {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
            color: #9ca3af;
        }

        .legend-line {
            width: 28px;
            height: 4px;
            border-radius: 2px;
        }

        .legend-line.completed { 
            background: #10b981; 
            box-shadow: 0 0 6px rgba(16, 185, 129, 0.4);
        }
        .legend-line.remaining { 
            background: #4b5563; 
        }

        /* Info Panel */
        #info-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(10, 14, 19, 0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 22px 24px;
            min-width: 290px;
            max-width: 340px;
            transform: translateY(12px);
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        #info-panel.visible {
            transform: translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        #info-panel .leg-number {
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 4px;
        }

        #info-panel .leg-title {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 14px;
            letter-spacing: -0.01em;
            color: #f9fafb;
        }

        #info-panel .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .stat-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 10px;
            padding: 10px 12px;
        }

        .stat-item .label {
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #6b7280;
            margin-bottom: 3px;
            font-weight: 500;
        }

        .stat-item .value {
            font-size: 0.95rem;
            font-weight: 600;
            color: #e5e7eb;
        }

        .stat-item .value.pace { color: #10b981; }
        .stat-item .value.year { color: #60a5fa; }

        #info-panel .rating-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 0.68rem;
            font-weight: 600;
        }

        .rating-E { background: rgba(16, 185, 129, 0.12); color: #34d399; }
        .rating-M { background: rgba(96, 165, 250, 0.12); color: #60a5fa; }
        .rating-MC { background: rgba(251, 191, 36, 0.12); color: #fbbf24; }
        .rating-MD { background: rgba(244, 63, 94, 0.12); color: #fb7185; }

        .completed-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.25);
            color: #10b981;
            padding: 5px 12px;
            border-radius: 14px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-bottom: 14px;
        }

        .not-completed-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(107, 114, 128, 0.1);
            border: 1px solid rgba(107, 114, 128, 0.2);
            color: #6b7280;
            padding: 5px 12px;
            border-radius: 14px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-bottom: 14px;
        }

        #close-panel {
            position: absolute;
            top: 14px;
            right: 14px;
            background: none;
            border: none;
            color: #6b7280;
            cursor: pointer;
            font-size: 1.3rem;
            padding: 4px;
            line-height: 1;
            transition: color 0.15s;
        }

        #close-panel:hover { color: #e7e9ea; }

        /* Mobile adjustments */
        @media (max-width: 768px) {
            #header {
                padding: 10px 14px;
            }
            #header h1 { font-size: 0.95rem; }
            #progress-badge { padding: 5px 10px; font-size: 0.7rem; }
            
            #legend {
                bottom: 12px;
                left: 12px;
                padding: 10px 14px;
            }

            #info-panel {
                bottom: 0;
                right: 0;
                left: 0;
                max-width: none;
                border-radius: 16px 16px 0 0;
                transform: translateY(100%);
            }

            #info-panel.visible {
                transform: translateY(0);
            }
        }

        /* Leaflet overrides */
        .leaflet-control-zoom {
            border: none !important;
            box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important;
        }
        .leaflet-control-zoom a {
            background: rgba(10, 14, 19, 0.92) !important;
            color: #d1d5db !important;
            border: 1px solid rgba(255,255,255,0.08) !important;
            backdrop-filter: blur(8px) !important;
        }
        .leaflet-control-zoom a:hover {
            background: rgba(20, 28, 38, 0.95) !important;
            color: #f9fafb !important;
        }
        .leaflet-control-attribution {
            background: rgba(10, 14, 19, 0.7) !important;
            color: #6b7280 !important;
            font-size: 10px !important;
        }
        .leaflet-control-attribution a {
            color: #9ca3af !important;
        }

        /* Leg number markers */
        .leg-marker {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            font-size: 9px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            border: 2px solid;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .leg-marker:hover {
            transform: scale(1.4);
        }

        .leg-marker.completed {
            background: #10b981;
            border-color: #10b981;
            color: #fff;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.6), 0 0 20px rgba(16, 185, 129, 0.2);
        }

        .leg-marker.remaining {
            background: rgba(10, 14, 19, 0.8);
            border-color: #4b5563;
            color: #9ca3af;
        }
    </style>
</head>
<body>
    <div id="header">
        <div>
            <h1>Sean's RTO Journey</h1>
            <span class="subtitle">Reno-Tahoe Odyssey • 178-Mile Relay</span>
        </div>
        <div id="progress-badge">
            <span class="count">12</span> / 36 legs
        </div>
    </div>

    <div id="map"></div>
    <div class="dark-overlay"></div>

    <div id="legend">
        <h3>Legend</h3>
        <div class="legend-item">
            <div class="legend-line completed"></div>
            <span>Completed</span>
        </div>
        <div class="legend-item">
            <div class="legend-line remaining"></div>
            <span>Not yet run</span>
        </div>
    </div>

    <div id="info-panel">
        <button id="close-panel">&times;</button>
        <div id="panel-content"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="data/routes.js"></script>
    <script>
    // ============================================================
    // COMPLETED LEGS - Edit this array to add new completed legs!
    // Format: { leg: NUMBER, year: YEAR, pace: "M:SS/mi" }
    // ============================================================
    const completedLegs = [
        { leg: 7,  year: 2022, pace: "7:58/mi" },
        { leg: 19, year: 2022, pace: "9:43/mi" },
        { leg: 31, year: 2022, pace: "9:59/mi" },
        { leg: 4,  year: 2023, pace: "9:14/mi" },
        { leg: 16, year: 2023, pace: "6:48/mi" },
        { leg: 28, year: 2023, pace: "7:32/mi" },
        { leg: 2,  year: 2024, pace: "6:58/mi" },
        { leg: 14, year: 2024, pace: "7:31/mi" },
        { leg: 26, year: 2024, pace: "7:07/mi" },
        { leg: 10, year: 2026, pace: "7:08/mi" },
        { leg: 22, year: 2026, pace: "7:00/mi" },
        { leg: 34, year: 2026, pace: "6:55/mi" }
    ];

    // ============================================================
    // LEG DATA (from RTO course info)
    // ============================================================
    const legs = [
        { leg: 1, miles: 4.9, rating: "E", runner: 1, description: "Reno to Verdi" },
        { leg: 2, miles: 4.4, rating: "M", runner: 2, description: "Verdi to Boomtown" },
        { leg: 3, miles: 5.5, rating: "M", runner: 3, description: "Boomtown to Dog Valley Rd" },
        { leg: 4, miles: 8.0, rating: "MD", runner: 4, description: "Dog Valley Rd to Truckee" },
        { leg: 5, miles: 5.6, rating: "M", runner: 5, description: "Truckee to Donner Lake" },
        { leg: 6, miles: 5.4, rating: "E", runner: 6, description: "Donner Lake to Truckee River" },
        { leg: 7, miles: 7.4, rating: "MC", runner: 7, description: "Truckee to Squaw Valley Rd" },
        { leg: 8, miles: 4.0, rating: "M", runner: 8, description: "Squaw Valley Rd to Tahoe City" },
        { leg: 9, miles: 5.3, rating: "M", runner: 9, description: "Tahoe City to Homewood" },
        { leg: 10, miles: 4.8, rating: "M", runner: 10, description: "Homewood to Tahoma" },
        { leg: 11, miles: 5.2, rating: "M", runner: 11, description: "Tahoma to Emerald Bay" },
        { leg: 12, miles: 6.2, rating: "M", runner: 12, description: "Emerald Bay to Camp Richardson" },
        { leg: 13, miles: 6.2, rating: "M", runner: 1, description: "Camp Richardson to South Lake Tahoe" },
        { leg: 14, miles: 6.2, rating: "MD", runner: 2, description: "South Lake Tahoe to Stateline" },
        { leg: 15, miles: 5.5, rating: "MC", runner: 3, description: "Stateline to Round Hill" },
        { leg: 16, miles: 3.4, rating: "E", runner: 4, description: "Round Hill to Zephyr Cove" },
        { leg: 17, miles: 3.3, rating: "E", runner: 5, description: "Zephyr Cove to Cave Rock" },
        { leg: 18, miles: 4.6, rating: "E", runner: 6, description: "Cave Rock to Glenbrook" },
        { leg: 19, miles: 3.8, rating: "MD", runner: 7, description: "Glenbrook to Spooner Summit" },
        { leg: 20, miles: 3.7, rating: "M", runner: 8, description: "Spooner Summit to Carson City" },
        { leg: 21, miles: 3.7, rating: "M", runner: 9, description: "Carson City (Hwy 50)" },
        { leg: 22, miles: 5.7, rating: "M", runner: 10, description: "Carson City to Genoa" },
        { leg: 23, miles: 6.1, rating: "M", runner: 11, description: "Genoa to Jacks Valley" },
        { leg: 24, miles: 3.2, rating: "E", runner: 12, description: "Jacks Valley to Carson City" },
        { leg: 25, miles: 3.4, rating: "E", runner: 1, description: "Carson City (Capital Odyssey Start)" },
        { leg: 26, miles: 5.5, rating: "M", runner: 2, description: "Carson City to Silver City" },
        { leg: 27, miles: 3.9, rating: "M", runner: 3, description: "Silver City to Gold Hill" },
        { leg: 28, miles: 4.8, rating: "M", runner: 4, description: "Gold Hill to Virginia City" },
        { leg: 29, miles: 3.4, rating: "MC", runner: 5, description: "Virginia City to Geiger Grade" },
        { leg: 30, miles: 3.4, rating: "MD", runner: 6, description: "Geiger Grade descent" },
        { leg: 31, miles: 2.6, rating: "MD", runner: 7, description: "Geiger Grade to Steamboat" },
        { leg: 32, miles: 3.3, rating: "MD", runner: 8, description: "Steamboat to Pleasant Valley" },
        { leg: 33, miles: 6.6, rating: "MC", runner: 9, description: "Pleasant Valley to South Reno" },
        { leg: 34, miles: 5.1, rating: "M", runner: 10, description: "South Reno to Moana Lane" },
        { leg: 35, miles: 6.9, rating: "MC", runner: 11, description: "Moana Lane to Midtown Reno" },
        { leg: 36, miles: 4.2, rating: "M", runner: 12, description: "Midtown Reno to Finish" }
    ];

    // Approximate coordinates for legs 14-36 (no GPX data yet)
    const fallbackCoordinates = {
        14: [[38.9570, -119.9600], [38.9580, -119.9500], [38.9590, -119.9400], [38.9600, -119.9300], [38.9620, -119.9200]],
        15: [[38.9620, -119.9200], [38.9700, -119.9300], [38.9800, -119.9400], [38.9900, -119.9450]],
        16: [[38.9900, -119.9450], [38.9950, -119.9470], [39.0050, -119.9490], [39.0100, -119.9500]],
        17: [[39.0100, -119.9500], [39.0180, -119.9470], [39.0250, -119.9440], [39.0350, -119.9400]],
        18: [[39.0350, -119.9400], [39.0500, -119.9350], [39.0650, -119.9300], [39.0800, -119.9260], [39.0900, -119.9250]],
        19: [[39.0900, -119.9250], [39.0980, -119.9220], [39.1050, -119.9150], [39.1100, -119.9080], [39.1200, -119.8950]],
        20: [[39.1200, -119.8950], [39.1300, -119.8800], [39.1400, -119.8600], [39.1550, -119.8200], [39.1650, -119.7700]],
        21: [[39.1650, -119.7700], [39.1680, -119.7650], [39.1700, -119.7600], [39.1750, -119.7500]],
        22: [[39.1750, -119.7500], [39.1600, -119.7550], [39.1400, -119.7650], [39.1100, -119.7800], [39.0800, -119.8000], [39.0000, -119.8500]],
        23: [[39.0000, -119.8500], [38.9900, -119.8450], [38.9750, -119.8350], [38.9600, -119.8200], [38.9500, -119.8000]],
        24: [[38.9500, -119.8000], [38.9550, -119.7900], [38.9600, -119.7800], [38.9700, -119.7700]],
        25: [[38.9700, -119.7700], [38.9750, -119.7680], [38.9800, -119.7650], [38.9900, -119.7600]],
        26: [[38.9900, -119.7600], [39.0050, -119.7450], [39.0200, -119.7300], [39.0400, -119.7100], [39.0600, -119.6800]],
        27: [[39.0600, -119.6800], [39.0700, -119.6700], [39.0800, -119.6600], [39.1000, -119.6500]],
        28: [[39.1000, -119.6500], [39.1200, -119.6450], [39.1400, -119.6400], [39.2000, -119.6450], [39.3100, -119.6500]],
        29: [[39.3100, -119.6500], [39.3150, -119.6480], [39.3200, -119.6450], [39.3300, -119.6350]],
        30: [[39.3300, -119.6350], [39.3400, -119.6450], [39.3500, -119.6550], [39.3700, -119.6700]],
        31: [[39.3700, -119.6700], [39.3800, -119.6800], [39.3900, -119.6900], [39.4100, -119.7100]],
        32: [[39.4100, -119.7100], [39.4200, -119.7150], [39.4350, -119.7250], [39.4500, -119.7400]],
        33: [[39.4500, -119.7400], [39.4600, -119.7450], [39.4750, -119.7530], [39.4900, -119.7600], [39.5000, -119.7700]],
        34: [[39.5000, -119.7700], [39.5080, -119.7760], [39.5150, -119.7830], [39.5200, -119.7900], [39.5250, -119.8000]],
        35: [[39.5250, -119.8000], [39.5270, -119.8060], [39.5280, -119.8120], [39.5290, -119.8200], [39.5300, -119.8280]],
        36: [[39.5300, -119.8280], [39.5295, -119.8220], [39.5290, -119.8180], [39.5282, -119.8179]]
    };

    // Build lookup
    const completedMap = {};
    completedLegs.forEach(c => { completedMap[c.leg] = c; });

    // Rating labels
    const ratingLabels = {
        "E": "Easy",
        "M": "Moderate",
        "MC": "More Challenging",
        "MD": "Most Difficult"
    };

    // ============================================================
    // MAP INITIALIZATION
    // ============================================================
    const map = L.map('map', {
        zoomControl: true,
        attributionControl: true,
        zoomSnap: 0.25
    });

    // Satellite tile layer (Esri) - will be muted by CSS overlay
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Tiles &copy; Esri',
        maxZoom: 18
    }).addTo(map);

    // Subtle road labels
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Transportation/MapServer/tile/{z}/{y}/{x}', {
        maxZoom: 18,
        opacity: 0.35
    }).addTo(map);

    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
        maxZoom: 18,
        opacity: 0.45
    }).addTo(map);

    // ============================================================
    // GET COORDINATES FOR A LEG (GPX if available, fallback otherwise)
    // ============================================================
    function getLegCoords(legNum) {
        if (gpxRoutes[legNum]) {
            return gpxRoutes[legNum];
        }
        return fallbackCoordinates[legNum] || [];
    }

    // ============================================================
    // DRAW COURSE LEGS
    // ============================================================
    const allCoords = [];

    legs.forEach(legData => {
        const coords = getLegCoords(legData.leg);
        if (!coords || coords.length === 0) return;

        const isCompleted = !!completedMap[legData.leg];
        allCoords.push(...coords);

        // Glow layer for completed legs (drawn first, underneath)
        if (isCompleted) {
            L.polyline(coords, {
                color: '#10b981',
                weight: 14,
                opacity: 0.12,
                lineCap: 'round',
                lineJoin: 'round',
                interactive: false
            }).addTo(map);

            L.polyline(coords, {
                color: '#10b981',
                weight: 8,
                opacity: 0.25,
                lineCap: 'round',
                lineJoin: 'round',
                interactive: false
            }).addTo(map);
        }

        // Main route line
        const polyline = L.polyline(coords, {
            color: isCompleted ? '#10b981' : '#6b7280',
            weight: isCompleted ? 4.5 : 2.5,
            opacity: isCompleted ? 1 : 0.5,
            lineCap: 'round',
            lineJoin: 'round'
        }).addTo(map);

        // Calculate midpoint for marker
        const midIdx = Math.floor(coords.length / 2);
        const midPoint = coords[midIdx];

        // Create numbered marker
        const markerHtml = `<div class="leg-marker ${isCompleted ? 'completed' : 'remaining'}">${legData.leg}</div>`;
        const marker = L.marker(midPoint, {
            icon: L.divIcon({
                html: markerHtml,
                className: '',
                iconSize: [22, 22],
                iconAnchor: [11, 11]
            }),
            zIndexOffset: isCompleted ? 100 : 0
        }).addTo(map);

        // Click handlers
        marker.on('click', () => showLegInfo(legData.leg));
        polyline.on('click', () => showLegInfo(legData.leg));
    });

    // Fit map to show entire course
    if (allCoords.length > 0) {
        const bounds = L.latLngBounds(allCoords);
        map.fitBounds(bounds, { 
            padding: [60, 60],
            maxZoom: 11
        });
    }

    // ============================================================
    // INFO PANEL
    // ============================================================
    const infoPanel = document.getElementById('info-panel');
    const panelContent = document.getElementById('panel-content');
    const closeBtn = document.getElementById('close-panel');

    closeBtn.addEventListener('click', () => {
        infoPanel.classList.remove('visible');
    });

    map.on('click', () => {
        infoPanel.classList.remove('visible');
    });

    function showLegInfo(legNum) {
        const legData = legs.find(l => l.leg === legNum);
        const completed = completedMap[legNum];

        let html = '';

        if (completed) {
            html += `<div class="completed-badge">✓ Completed</div>`;
        } else {
            html += `<div class="not-completed-badge">○ Not yet run</div>`;
        }

        html += `<div class="leg-number">Leg ${legNum} • Runner #${legData.runner}</div>`;
        html += `<div class="leg-title">${legData.description}</div>`;

        html += `<div class="stats-grid">`;
        html += `<div class="stat-item"><div class="label">Distance</div><div class="value">${legData.miles} mi</div></div>`;
        html += `<div class="stat-item"><div class="label">Difficulty</div><div class="value"><span class="rating-badge rating-${legData.rating}">${ratingLabels[legData.rating]}</span></div></div>`;

        if (completed) {
            html += `<div class="stat-item"><div class="label">Pace</div><div class="value pace">${completed.pace}</div></div>`;
            html += `<div class="stat-item"><div class="label">Year</div><div class="value year">${completed.year}</div></div>`;
        }

        html += `</div>`;

        panelContent.innerHTML = html;
        infoPanel.classList.add('visible');
    }

    // Update progress count
    document.querySelector('#progress-badge .count').textContent = completedLegs.length;
    </script>
</body>
</html>
