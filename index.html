<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sean's RTO Journey</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #111;
            color: #e7e9ea;
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
        }

        /* ===== HEADER ===== */
        #header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(15, 20, 25, 0.88);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding: 12px 24px 10px;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        #header h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            background: linear-gradient(135deg, #47aa43, #1ebbf0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
        }

        #header .subtitle {
            font-size: 0.72rem;
            color: #9ca3af;
            font-weight: 400;
            margin-top: 2px;
            letter-spacing: 0.03em;
        }

        .header-logo {
            height: 40px;
            opacity: 0.85;
        }

        /* ===== PROGRESS BAR ===== */
        #progress-bar-container {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #progress-bar-track {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,0.08);
            border-radius: 3px;
            overflow: hidden;
        }

        #progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #47aa43, #1ebbf0);
            border-radius: 3px;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 8px rgba(71, 170, 67, 0.4);
        }

        #progress-label {
            font-size: 0.72rem;
            color: #9ca3af;
            white-space: nowrap;
            font-weight: 500;
        }

        #progress-label span {
            color: #47aa43;
            font-weight: 700;
        }

        /* ===== MAP ===== */
        #map {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1;
        }

        /* Darken ONLY the tile layers, not the SVG overlays (polylines/markers) */
        .leaflet-tile-pane {
            filter: brightness(0.6) saturate(0.7);
        }

        /* ===== LEGEND ===== */
        #legend {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(15, 20, 25, 0.88);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 14px 18px;
            font-size: 0.75rem;
        }

        #legend h3 {
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
            color: #d1d5db;
        }

        .legend-line {
            width: 28px;
            height: 6px;
            border-radius: 3px;
            border: 1.5px solid rgba(255,255,255,0.5);
        }

        .legend-line.completed { 
            background: #47aa43; 
            box-shadow: 0 0 8px rgba(71, 170, 67, 0.6);
        }
        .legend-line.remaining { 
            background: #c8d6e5;
        }

        /* ===== INFO PANEL ===== */
        #info-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(15, 20, 25, 0.94);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 22px 24px;
            min-width: 290px;
            max-width: 340px;
            transform: translateY(12px);
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        #info-panel.visible {
            transform: translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        #info-panel .leg-number {
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 4px;
        }

        #info-panel .leg-title {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 14px;
            color: #f9fafb;
        }

        #info-panel .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .stat-item {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            padding: 10px 12px;
        }

        .stat-item .label {
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #6b7280;
            margin-bottom: 3px;
            font-weight: 500;
        }

        .stat-item .value {
            font-size: 0.95rem;
            font-weight: 600;
            color: #e5e7eb;
        }

        .stat-item .value.pace { color: #47aa43; }
        .stat-item .value.year { color: #1ebbf0; }

        .rating-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 0.68rem;
            font-weight: 600;
        }

        .rating-E { background: rgba(71, 170, 67, 0.15); color: #6ee66a; }
        .rating-M { background: rgba(30, 187, 240, 0.15); color: #60c8f0; }
        .rating-MC { background: rgba(251, 191, 36, 0.15); color: #fbbf24; }
        .rating-MD { background: rgba(244, 63, 94, 0.15); color: #fb7185; }

        .completed-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(71, 170, 67, 0.12);
            border: 1px solid rgba(71, 170, 67, 0.3);
            color: #47aa43;
            padding: 5px 12px;
            border-radius: 14px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-bottom: 14px;
        }

        .not-completed-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(160, 174, 192, 0.1);
            border: 1px solid rgba(160, 174, 192, 0.2);
            color: #a0aec0;
            padding: 5px 12px;
            border-radius: 14px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-bottom: 14px;
        }

        #close-panel {
            position: absolute;
            top: 14px;
            right: 14px;
            background: none;
            border: none;
            color: #6b7280;
            cursor: pointer;
            font-size: 1.3rem;
            padding: 4px;
            line-height: 1;
        }

        #close-panel:hover { color: #e7e9ea; }

        /* ===== MOBILE ===== */
        @media (max-width: 768px) {
            #header { padding: 10px 14px 6px; }
            #header h1 { font-size: 1.6rem; }
            .header-logo { height: 30px; }
            #legend { bottom: 12px; left: 12px; padding: 10px 14px; }
            #info-panel {
                bottom: 0; right: 0; left: 0;
                max-width: none;
                border-radius: 16px 16px 0 0;
                transform: translateY(100%);
            }
            #info-panel.visible { transform: translateY(0); }
        }

        /* ===== LEAFLET OVERRIDES ===== */
        .leaflet-control-zoom { border: none !important; box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important; }
        .leaflet-control-zoom a { background: rgba(15, 20, 25, 0.9) !important; color: #d1d5db !important; border: 1px solid rgba(255,255,255,0.08) !important; }
        .leaflet-control-zoom a:hover { background: rgba(25, 35, 45, 0.95) !important; }
        .leaflet-control-attribution { background: rgba(15, 20, 25, 0.6) !important; color: #6b7280 !important; font-size: 10px !important; }
        .leaflet-control-attribution a { color: #9ca3af !important; }

        /* ===== LEG MARKERS ===== */
        .leg-marker {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            font-size: 11px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            border: 2.5px solid;
            cursor: pointer;
            transition: transform 0.15s ease;
        }

        .leg-marker:hover { transform: scale(1.35); }

        .leg-marker.completed {
            background: #47aa43;
            border-color: #fff;
            color: #fff;
            box-shadow: 0 0 12px rgba(71, 170, 67, 0.8), 0 2px 6px rgba(0,0,0,0.4);
        }

        .leg-marker.remaining {
            background: rgba(30, 40, 55, 0.9);
            border-color: rgba(255,255,255,0.6);
            color: #e0e0e0;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>
    <div id="header">
        <div class="header-top">
            <div>
                <h1>Sean's RTO Journey</h1>
                <span class="subtitle">Reno-Tahoe Odyssey • 178-Mile Relay</span>
            </div>
            <img class="header-logo" src="https://renotahoeodyssey.com/wp-content/uploads/2026/03/178-RTO-Odyssey_out-3.5.26.png" alt="RTO Logo">
        </div>
        <div id="progress-bar-container">
            <div id="progress-bar-track">
                <div id="progress-bar-fill"></div>
            </div>
            <div id="progress-label"><span id="progress-count">12</span> of 36 legs completed</div>
        </div>
    </div>

    <div id="map"></div>

    <div id="legend">
        <h3>Legend</h3>
        <div class="legend-item">
            <div class="legend-line completed"></div>
            <span>Completed</span>
        </div>
        <div class="legend-item">
            <div class="legend-line remaining"></div>
            <span>Not yet run</span>
        </div>
    </div>

    <div id="info-panel">
        <button id="close-panel">&times;</button>
        <div id="panel-content"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="data/routes.js"></script>
    <script>
    // ============================================================
    // COMPLETED LEGS - Edit this array to add new completed legs!
    // Format: { leg: NUMBER, year: YEAR, pace: "M:SS/mi" }
    // ============================================================
    const completedLegs = [
        { leg: 7,  year: 2022, pace: "7:58/mi" },
        { leg: 19, year: 2022, pace: "9:43/mi" },
        { leg: 31, year: 2022, pace: "9:59/mi" },
        { leg: 4,  year: 2023, pace: "9:14/mi" },
        { leg: 16, year: 2023, pace: "6:48/mi" },
        { leg: 28, year: 2023, pace: "7:32/mi" },
        { leg: 2,  year: 2024, pace: "6:58/mi" },
        { leg: 14, year: 2024, pace: "7:31/mi" },
        { leg: 26, year: 2024, pace: "7:07/mi" },
        { leg: 10, year: 2026, pace: "7:08/mi" },
        { leg: 22, year: 2026, pace: "7:00/mi" },
        { leg: 34, year: 2026, pace: "6:55/mi" }
    ];

    // ============================================================
    // LEG DATA
    // ============================================================
    const legs = [
        { leg: 1, miles: 4.9, rating: "E", runner: 1, description: "Reno to Verdi" },
        { leg: 2, miles: 4.4, rating: "M", runner: 2, description: "Verdi to Boomtown" },
        { leg: 3, miles: 5.5, rating: "M", runner: 3, description: "Boomtown to Dog Valley Rd" },
        { leg: 4, miles: 8.0, rating: "MD", runner: 4, description: "Dog Valley Rd to Truckee" },
        { leg: 5, miles: 5.6, rating: "M", runner: 5, description: "Truckee to Donner Lake" },
        { leg: 6, miles: 5.4, rating: "E", runner: 6, description: "Donner Lake to Truckee River" },
        { leg: 7, miles: 7.4, rating: "MC", runner: 7, description: "Truckee to Squaw Valley Rd" },
        { leg: 8, miles: 4.0, rating: "M", runner: 8, description: "Squaw Valley Rd to Tahoe City" },
        { leg: 9, miles: 5.3, rating: "M", runner: 9, description: "Tahoe City to Homewood" },
        { leg: 10, miles: 4.8, rating: "M", runner: 10, description: "Homewood to Tahoma" },
        { leg: 11, miles: 5.2, rating: "M", runner: 11, description: "Tahoma to Emerald Bay" },
        { leg: 12, miles: 6.2, rating: "M", runner: 12, description: "Emerald Bay to Camp Richardson" },
        { leg: 13, miles: 6.2, rating: "M", runner: 1, description: "Camp Richardson to South Lake Tahoe" },
        { leg: 14, miles: 6.2, rating: "MD", runner: 2, description: "South Lake Tahoe to Stateline" },
        { leg: 15, miles: 5.5, rating: "MC", runner: 3, description: "Stateline to Round Hill" },
        { leg: 16, miles: 3.4, rating: "E", runner: 4, description: "Round Hill to Zephyr Cove" },
        { leg: 17, miles: 3.3, rating: "E", runner: 5, description: "Zephyr Cove to Cave Rock" },
        { leg: 18, miles: 4.6, rating: "E", runner: 6, description: "Cave Rock to Glenbrook" },
        { leg: 19, miles: 3.8, rating: "MD", runner: 7, description: "Glenbrook to Spooner Summit" },
        { leg: 20, miles: 3.7, rating: "M", runner: 8, description: "Spooner Summit to Carson City" },
        { leg: 21, miles: 3.7, rating: "M", runner: 9, description: "Carson City (Hwy 50)" },
        { leg: 22, miles: 5.7, rating: "M", runner: 10, description: "Carson City to Genoa" },
        { leg: 23, miles: 6.1, rating: "M", runner: 11, description: "Genoa to Jacks Valley" },
        { leg: 24, miles: 3.2, rating: "E", runner: 12, description: "Jacks Valley to Carson City" },
        { leg: 25, miles: 3.4, rating: "E", runner: 1, description: "Carson City (Capital Odyssey Start)" },
        { leg: 26, miles: 5.5, rating: "M", runner: 2, description: "Carson City to Silver City" },
        { leg: 27, miles: 3.9, rating: "M", runner: 3, description: "Silver City to Gold Hill" },
        { leg: 28, miles: 4.8, rating: "M", runner: 4, description: "Gold Hill to Virginia City" },
        { leg: 29, miles: 3.4, rating: "MC", runner: 5, description: "Virginia City to Geiger Grade" },
        { leg: 30, miles: 3.4, rating: "MD", runner: 6, description: "Geiger Grade descent" },
        { leg: 31, miles: 2.6, rating: "MD", runner: 7, description: "Geiger Grade to Steamboat" },
        { leg: 32, miles: 3.3, rating: "MD", runner: 8, description: "Steamboat to Pleasant Valley" },
        { leg: 33, miles: 6.6, rating: "MC", runner: 9, description: "Pleasant Valley to South Reno" },
        { leg: 34, miles: 5.1, rating: "M", runner: 10, description: "South Reno to Moana Lane" },
        { leg: 35, miles: 6.9, rating: "MC", runner: 11, description: "Moana Lane to Midtown Reno" },
        { leg: 36, miles: 4.2, rating: "M", runner: 12, description: "Midtown Reno to Finish" }
    ];

    // Build lookup
    const completedMap = {};
    completedLegs.forEach(c => { completedMap[c.leg] = c; });
    const ratingLabels = { "E": "Easy", "M": "Moderate", "MC": "More Challenging", "MD": "Most Difficult" };

    // ============================================================
    // MAP
    // ============================================================
    const map = L.map('map', { zoomControl: true, attributionControl: true, zoomSnap: 0.25 });

    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Tiles &copy; Esri', maxZoom: 18
    }).addTo(map);

    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Transportation/MapServer/tile/{z}/{y}/{x}', {
        maxZoom: 18, opacity: 0.4
    }).addTo(map);

    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
        maxZoom: 18, opacity: 0.5
    }).addTo(map);

    // ============================================================
    // DRAW LEGS - with white outline for pop
    // ============================================================
    function getLegCoords(legNum) {
        if (typeof gpxRoutes !== 'undefined' && gpxRoutes[legNum]) return gpxRoutes[legNum];
        return [];
    }

    const allCoords = [];

    // Draw in two passes: first all outlines, then all colored lines on top
    // Pass 1: White outlines (border effect)
    legs.forEach(legData => {
        const coords = getLegCoords(legData.leg);
        if (!coords || coords.length === 0) return;
        const isCompleted = !!completedMap[legData.leg];
        allCoords.push(...coords);

        // White outline (thicker, underneath)
        L.polyline(coords, {
            color: '#ffffff',
            weight: isCompleted ? 14 : 10,
            opacity: isCompleted ? 0.5 : 0.35,
            lineCap: 'round',
            lineJoin: 'round',
            interactive: false
        }).addTo(map);
    });

    // Pass 2: Colored lines and glow on top
    legs.forEach(legData => {
        const coords = getLegCoords(legData.leg);
        if (!coords || coords.length === 0) return;
        const isCompleted = !!completedMap[legData.leg];

        // Green glow for completed
        if (isCompleted) {
            L.polyline(coords, {
                color: '#47aa43',
                weight: 20,
                opacity: 0.15,
                lineCap: 'round',
                lineJoin: 'round',
                interactive: false
            }).addTo(map);
        }

        // Main colored line - THICK
        const polyline = L.polyline(coords, {
            color: isCompleted ? '#5cd658' : '#c8d6e5',
            weight: isCompleted ? 9 : 7,
            opacity: isCompleted ? 1 : 0.85,
            lineCap: 'round',
            lineJoin: 'round'
        }).addTo(map);

        // Marker at midpoint
        const midIdx = Math.floor(coords.length / 2);
        const midPoint = coords[midIdx];
        const markerHtml = `<div class="leg-marker ${isCompleted ? 'completed' : 'remaining'}">${legData.leg}</div>`;
        const marker = L.marker(midPoint, {
            icon: L.divIcon({ html: markerHtml, className: '', iconSize: [30, 30], iconAnchor: [15, 15] }),
            zIndexOffset: isCompleted ? 100 : 0
        }).addTo(map);

        marker.on('click', () => showLegInfo(legData.leg));
        polyline.on('click', () => showLegInfo(legData.leg));
    });

    // Fit bounds to course
    if (allCoords.length > 0) {
        map.fitBounds(L.latLngBounds(allCoords), { padding: [80, 80], maxZoom: 11 });
    }

    // ============================================================
    // INFO PANEL
    // ============================================================
    const infoPanel = document.getElementById('info-panel');
    const panelContent = document.getElementById('panel-content');
    document.getElementById('close-panel').addEventListener('click', () => infoPanel.classList.remove('visible'));
    map.on('click', () => infoPanel.classList.remove('visible'));

    function showLegInfo(legNum) {
        const legData = legs.find(l => l.leg === legNum);
        const completed = completedMap[legNum];
        let html = '';
        html += completed
            ? `<div class="completed-badge">✓ Completed</div>`
            : `<div class="not-completed-badge">○ Not yet run</div>`;
        html += `<div class="leg-number">Leg ${legNum} • Runner #${legData.runner}</div>`;
        html += `<div class="leg-title">${legData.description}</div>`;
        html += `<div class="stats-grid">`;
        html += `<div class="stat-item"><div class="label">Distance</div><div class="value">${legData.miles} mi</div></div>`;
        html += `<div class="stat-item"><div class="label">Difficulty</div><div class="value"><span class="rating-badge rating-${legData.rating}">${ratingLabels[legData.rating]}</span></div></div>`;
        if (completed) {
            html += `<div class="stat-item"><div class="label">Pace</div><div class="value pace">${completed.pace}</div></div>`;
            html += `<div class="stat-item"><div class="label">Year</div><div class="value year">${completed.year}</div></div>`;
        }
        html += `</div>`;
        panelContent.innerHTML = html;
        infoPanel.classList.add('visible');
    }

    // ============================================================
    // PROGRESS BAR
    // ============================================================
    const count = completedLegs.length;
    document.getElementById('progress-count').textContent = count;
    document.getElementById('progress-bar-fill').style.width = `${(count / 36) * 100}%`;
    </script>
</body>
</html>
