<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sean's RTO Journey</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #111;
            color: #e7e9ea;
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
        }

        /* ===== HEADER ===== */
        #header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(15, 20, 25, 0.88);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding: 12px 24px 10px;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        #header h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            background: linear-gradient(135deg, #47aa43, #1ebbf0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
        }

        #header .subtitle {
            font-size: 0.72rem;
            color: #9ca3af;
            font-weight: 400;
            margin-top: 2px;
            letter-spacing: 0.03em;
        }

        .header-logo { height: 40px; opacity: 0.85; }

        /* ===== PROGRESS BAR ===== */
        #progress-bar-container {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #progress-bar-track {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,0.08);
            border-radius: 3px;
            overflow: hidden;
        }

        #progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #47aa43, #1ebbf0);
            border-radius: 3px;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 8px rgba(71, 170, 67, 0.4);
        }

        #progress-label {
            font-size: 0.72rem;
            color: #9ca3af;
            white-space: nowrap;
            font-weight: 500;
        }

        #progress-label span { color: #47aa43; font-weight: 700; }

        /* ===== MAP ===== */
        #map {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 1;
        }

        /* Mute satellite tiles - lighter than before */
        .leaflet-tile-pane {
            filter: brightness(0.78) saturate(0.75);
        }

        /* ===== LEGEND ===== */
        #legend {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(15, 20, 25, 0.88);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 14px 18px;
            font-size: 0.75rem;
        }

        #legend h3 {
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
            color: #d1d5db;
        }

        .legend-line {
            width: 28px;
            height: 6px;
            border-radius: 3px;
            border: 1.5px solid rgba(255,255,255,0.5);
        }

        .legend-line.completed { 
            background: #47aa43; 
            box-shadow: 0 0 8px rgba(71, 170, 67, 0.6);
        }
        .legend-line.remaining { background: #c8d6e5; }

        /* ===== INFO PANEL ===== */
        #info-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(15, 20, 25, 0.94);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 22px 24px;
            min-width: 300px;
            max-width: 360px;
            transform: translateY(12px);
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        #info-panel.visible {
            transform: translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        #info-panel .leg-number {
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 3px;
        }

        #info-panel .leg-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: #f9fafb;
        }

        /* Single compact row of stats - never wraps */
        #info-panel .stats-row {
            display: flex;
            gap: 6px;
            flex-wrap: nowrap;
        }

        .stat-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 8px;
            padding: 5px 10px;
            font-size: 0.72rem;
            white-space: nowrap;
        }

        .stat-chip .label {
            color: #6b7280;
            font-weight: 500;
        }

        .stat-chip .value {
            font-weight: 600;
            color: #e5e7eb;
        }

        .stat-chip .value.pace { color: #47aa43; }
        .stat-chip .value.year { color: #1ebbf0; }

        .rating-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.65rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .rating-E { background: rgba(71, 170, 67, 0.15); color: #6ee66a; }
        .rating-M { background: rgba(30, 187, 240, 0.15); color: #60c8f0; }
        .rating-MC { background: rgba(251, 191, 36, 0.15); color: #fbbf24; }
        .rating-MD { background: rgba(244, 63, 94, 0.15); color: #fb7185; }

        .completed-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            background: rgba(71, 170, 67, 0.1);
            border: 1px solid rgba(71, 170, 67, 0.3);
            color: #47aa43;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 0.82rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .not-completed-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            background: rgba(160, 174, 192, 0.06);
            border: 1px solid rgba(160, 174, 192, 0.2);
            color: #a0aec0;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 0.82rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        /* Elevation chart */
        .elevation-container {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        .elevation-label {
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #6b7280;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .elevation-chart {
            width: 100%;
            height: 70px;
            position: relative;
        }

        .elevation-chart canvas {
            width: 100%;
            height: 100%;
            border-radius: 6px;
        }

        .elevation-stats {
            display: flex;
            justify-content: space-between;
            margin-top: 6px;
            font-size: 0.6rem;
            color: #6b7280;
        }

        /* Zoom out button */
        #zoom-out-btn {
            display: none;
            margin-top: 14px;
            width: 100%;
            padding: 10px 16px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            color: #d1d5db;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
            font-family: 'Inter', sans-serif;
        }

        #zoom-out-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.2);
            color: #fff;
        }

        #close-panel {
            position: absolute;
            top: 14px;
            right: 14px;
            background: none;
            border: none;
            color: #6b7280;
            cursor: pointer;
            font-size: 1.3rem;
            padding: 4px;
            line-height: 1;
        }

        #close-panel:hover { color: #e7e9ea; }

        /* ===== MOBILE ===== */
        @media (max-width: 768px) {
            #header { padding: 6px 12px 5px; }
            #header h1 { font-size: 1.3rem; }
            #header .subtitle { font-size: 0.6rem; margin-top: 0; }
            .header-top { margin-bottom: 5px; }
            .header-logo { height: 24px; }
            #progress-bar-container { gap: 8px; }
            #progress-bar-track { height: 4px; }
            #progress-label { font-size: 0.6rem; }
            #legend { bottom: 10px; left: 10px; padding: 8px 12px; font-size: 0.65rem; }
            #legend h3 { margin-bottom: 6px; }
            #info-panel {
                bottom: 0; right: 0; left: 0;
                max-width: none;
                border-radius: 14px 14px 0 0;
                transform: translateY(100%);
                max-height: 52vh;
                overflow-y: auto;
                padding: 16px 16px;
            }
            #info-panel.visible { transform: translateY(0); }
            #info-panel .leg-title { font-size: 1rem; margin-bottom: 8px; }
            .completed-badge, .not-completed-badge { padding: 6px 10px; font-size: 0.75rem; margin-bottom: 8px; }
            .stat-chip { padding: 4px 8px; font-size: 0.65rem; }
            .elevation-container { margin-top: 10px; padding-top: 10px; }
            .elevation-chart { height: 55px; }
            #zoom-out-btn { margin-top: 10px; padding: 8px 12px; font-size: 0.7rem; }
        }

        /* ===== SELECTED LEG HIGHLIGHT ===== */
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 0.3; }
        }

        .leg-highlight {
            animation: pulse-glow 2s ease-in-out infinite;
        }

        /* ===== LEAFLET OVERRIDES ===== */
        .leaflet-control-zoom { border: none !important; box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important; }
        .leaflet-control-zoom a { background: rgba(15, 20, 25, 0.9) !important; color: #d1d5db !important; border: 1px solid rgba(255,255,255,0.08) !important; }
        .leaflet-control-zoom a:hover { background: rgba(25, 35, 45, 0.95) !important; }
        .leaflet-control-attribution { background: rgba(15, 20, 25, 0.6) !important; color: #6b7280 !important; font-size: 10px !important; }
        .leaflet-control-attribution a { color: #9ca3af !important; }

        /* ===== LEG MARKERS ===== */
        .leg-marker {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            font-size: 11px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            border: 2.5px solid;
            cursor: pointer;
            transition: transform 0.15s ease;
        }

        .leg-marker:hover { transform: scale(1.35); }

        .leg-marker.completed {
            background: #47aa43;
            border-color: #fff;
            color: #fff;
            box-shadow: 0 0 12px rgba(71, 170, 67, 0.8), 0 2px 6px rgba(0,0,0,0.4);
        }

        .leg-marker.remaining {
            background: rgba(30, 40, 55, 0.9);
            border-color: rgba(255,255,255,0.6);
            color: #e0e0e0;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>
    <div id="header">
        <div class="header-top">
            <div>
                <h1>Sean's RTO Journey</h1>
                <span class="subtitle">Reno-Tahoe Odyssey • 178-Mile Relay</span>
            </div>
            <img class="header-logo" src="https://renotahoeodyssey.com/wp-content/uploads/2026/03/178-RTO-Odyssey_out-3.5.26.png" alt="RTO Logo">
        </div>
        <div id="progress-bar-container">
            <div id="progress-bar-track">
                <div id="progress-bar-fill"></div>
            </div>
            <div id="progress-label"><span id="progress-count">12</span> of 36 legs completed</div>
        </div>
    </div>

    <div id="map"></div>

    <div id="legend">
        <h3>Legend</h3>
        <div class="legend-item">
            <div class="legend-line completed"></div>
            <span>Completed</span>
        </div>
        <div class="legend-item">
            <div class="legend-line remaining"></div>
            <span>Not yet run</span>
        </div>
    </div>

    <div id="info-panel">
        <button id="close-panel">&times;</button>
        <div id="panel-content"></div>
        <button id="zoom-out-btn">← Back to full course</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="data/routes.js"></script>
    <script src="data/elevations.js"></script>
    <script>
    // ============================================================
    // COMPLETED LEGS - Edit this array to add new completed legs!
    // Format: { leg: NUMBER, year: YEAR, pace: "M:SS/mi" }
    // ============================================================
    const completedLegs = [
        { leg: 7,  year: 2022, pace: "7:58/mi" },
        { leg: 19, year: 2022, pace: "9:43/mi" },
        { leg: 31, year: 2022, pace: "9:59/mi" },
        { leg: 4,  year: 2023, pace: "9:14/mi" },
        { leg: 16, year: 2023, pace: "6:48/mi" },
        { leg: 28, year: 2023, pace: "7:32/mi" },
        { leg: 2,  year: 2024, pace: "6:58/mi" },
        { leg: 14, year: 2024, pace: "7:31/mi" },
        { leg: 26, year: 2024, pace: "7:07/mi" },
        { leg: 10, year: 2026, pace: "7:08/mi" },
        { leg: 22, year: 2026, pace: "7:00/mi" },
        { leg: 34, year: 2026, pace: "6:55/mi" }
    ];

    // ============================================================
    // LEG DATA
    // ============================================================
    const legs = [
        { leg: 1, miles: 4.9, rating: "E", runner: 1, description: "Reno to Verdi" },
        { leg: 2, miles: 4.4, rating: "M", runner: 2, description: "Verdi to Boomtown" },
        { leg: 3, miles: 5.5, rating: "M", runner: 3, description: "Boomtown to Dog Valley Rd" },
        { leg: 4, miles: 8.0, rating: "MD", runner: 4, description: "Dog Valley Rd to Truckee" },
        { leg: 5, miles: 5.6, rating: "M", runner: 5, description: "Truckee to Donner Lake" },
        { leg: 6, miles: 5.4, rating: "E", runner: 6, description: "Donner Lake to Truckee River" },
        { leg: 7, miles: 7.4, rating: "MC", runner: 7, description: "Truckee to Squaw Valley Rd" },
        { leg: 8, miles: 4.0, rating: "M", runner: 8, description: "Squaw Valley Rd to Tahoe City" },
        { leg: 9, miles: 5.3, rating: "M", runner: 9, description: "Tahoe City to Homewood" },
        { leg: 10, miles: 4.8, rating: "M", runner: 10, description: "Homewood to Tahoma" },
        { leg: 11, miles: 5.2, rating: "M", runner: 11, description: "Tahoma to Emerald Bay" },
        { leg: 12, miles: 6.2, rating: "M", runner: 12, description: "Emerald Bay to Camp Richardson" },
        { leg: 13, miles: 6.2, rating: "M", runner: 1, description: "Camp Richardson to South Lake Tahoe" },
        { leg: 14, miles: 6.2, rating: "MD", runner: 2, description: "South Lake Tahoe to Stateline" },
        { leg: 15, miles: 5.5, rating: "MC", runner: 3, description: "Stateline to Round Hill" },
        { leg: 16, miles: 3.4, rating: "E", runner: 4, description: "Round Hill to Zephyr Cove" },
        { leg: 17, miles: 3.3, rating: "E", runner: 5, description: "Zephyr Cove to Cave Rock" },
        { leg: 18, miles: 4.6, rating: "E", runner: 6, description: "Cave Rock to Glenbrook" },
        { leg: 19, miles: 3.8, rating: "MD", runner: 7, description: "Glenbrook to Spooner Summit" },
        { leg: 20, miles: 3.7, rating: "M", runner: 8, description: "Spooner Summit to Carson City" },
        { leg: 21, miles: 3.7, rating: "M", runner: 9, description: "Carson City (Hwy 50)" },
        { leg: 22, miles: 5.7, rating: "M", runner: 10, description: "Carson City to Genoa" },
        { leg: 23, miles: 6.1, rating: "M", runner: 11, description: "Genoa to Jacks Valley" },
        { leg: 24, miles: 3.2, rating: "E", runner: 12, description: "Jacks Valley to Carson City" },
        { leg: 25, miles: 3.4, rating: "E", runner: 1, description: "Carson City (Capital Odyssey Start)" },
        { leg: 26, miles: 5.5, rating: "M", runner: 2, description: "Carson City to Silver City" },
        { leg: 27, miles: 3.9, rating: "M", runner: 3, description: "Silver City to Gold Hill" },
        { leg: 28, miles: 4.8, rating: "M", runner: 4, description: "Gold Hill to Virginia City" },
        { leg: 29, miles: 3.4, rating: "MC", runner: 5, description: "Virginia City to Geiger Grade" },
        { leg: 30, miles: 3.4, rating: "MD", runner: 6, description: "Geiger Grade descent" },
        { leg: 31, miles: 2.6, rating: "MD", runner: 7, description: "Geiger Grade to Steamboat" },
        { leg: 32, miles: 3.3, rating: "MD", runner: 8, description: "Steamboat to Pleasant Valley" },
        { leg: 33, miles: 6.6, rating: "MC", runner: 9, description: "Pleasant Valley to South Reno" },
        { leg: 34, miles: 5.1, rating: "M", runner: 10, description: "South Reno to Moana Lane" },
        { leg: 35, miles: 6.9, rating: "MC", runner: 11, description: "Moana Lane to Midtown Reno" },
        { leg: 36, miles: 4.2, rating: "M", runner: 12, description: "Midtown Reno to Finish" }
    ];

    // Build lookups
    const completedMap = {};
    completedLegs.forEach(c => { completedMap[c.leg] = c; });
    const ratingLabels = { "E": "Easy", "M": "Moderate", "MC": "Challenging", "MD": "Hard" };

    // Highlight layer for selected leg
    let highlightLayers = [];

    // ============================================================
    // MAP
    // ============================================================
    const map = L.map('map', { zoomControl: true, attributionControl: true, zoomSnap: 0.25 });

    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Tiles &copy; Esri', maxZoom: 18
    }).addTo(map);

    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Transportation/MapServer/tile/{z}/{y}/{x}', {
        maxZoom: 18, opacity: 0.4
    }).addTo(map);

    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
        maxZoom: 18, opacity: 0.5
    }).addTo(map);

    // ============================================================
    // DRAW LEGS
    // ============================================================
    function getLegCoords(legNum) {
        if (typeof gpxRoutes !== 'undefined' && gpxRoutes[legNum]) return gpxRoutes[legNum];
        return [];
    }

    const allCoords = [];
    let courseBounds;

    // Pass 1: White outlines
    legs.forEach(legData => {
        const coords = getLegCoords(legData.leg);
        if (!coords || coords.length === 0) return;
        const isCompleted = !!completedMap[legData.leg];
        allCoords.push(...coords);

        L.polyline(coords, {
            color: '#ffffff',
            weight: isCompleted ? 14 : 10,
            opacity: isCompleted ? 0.5 : 0.35,
            lineCap: 'round',
            lineJoin: 'round',
            interactive: false
        }).addTo(map);
    });

    // Pass 2: Colored lines
    legs.forEach(legData => {
        const coords = getLegCoords(legData.leg);
        if (!coords || coords.length === 0) return;
        const isCompleted = !!completedMap[legData.leg];

        if (isCompleted) {
            L.polyline(coords, {
                color: '#47aa43',
                weight: 20,
                opacity: 0.15,
                lineCap: 'round', lineJoin: 'round', interactive: false
            }).addTo(map);
        }

        const polyline = L.polyline(coords, {
            color: isCompleted ? '#5cd658' : '#c8d6e5',
            weight: isCompleted ? 9 : 7,
            opacity: isCompleted ? 1 : 0.85,
            lineCap: 'round', lineJoin: 'round'
        }).addTo(map);

        const midIdx = Math.floor(coords.length / 2);
        const midPoint = coords[midIdx];
        const markerHtml = `<div class="leg-marker ${isCompleted ? 'completed' : 'remaining'}">${legData.leg}</div>`;
        const marker = L.marker(midPoint, {
            icon: L.divIcon({ html: markerHtml, className: '', iconSize: [30, 30], iconAnchor: [15, 15] }),
            zIndexOffset: isCompleted ? 100 : 0
        }).addTo(map);

        marker.on('click', (e) => { L.DomEvent.stopPropagation(e); showLegInfo(legData.leg); });
        polyline.on('click', (e) => { L.DomEvent.stopPropagation(e); showLegInfo(legData.leg); });
    });

    // Fit bounds
    if (allCoords.length > 0) {
        courseBounds = L.latLngBounds(allCoords);
        map.fitBounds(courseBounds, { padding: [80, 80], maxZoom: 11 });
    }

    // ============================================================
    // INFO PANEL + ZOOM
    // ============================================================
    const infoPanel = document.getElementById('info-panel');
    const panelContent = document.getElementById('panel-content');
    const zoomOutBtn = document.getElementById('zoom-out-btn');
    let isZoomedIn = false;

    document.getElementById('close-panel').addEventListener('click', () => {
        infoPanel.classList.remove('visible');
        clearHighlight();
        zoomBackOut();
    });

    zoomOutBtn.addEventListener('click', () => {
        infoPanel.classList.remove('visible');
        zoomBackOut();
    });

    map.on('click', () => {
        if (!isZoomedIn) {
            infoPanel.classList.remove('visible');
        }
    });

    function clearHighlight() {
        highlightLayers.forEach(layer => map.removeLayer(layer));
        highlightLayers = [];
    }

    function zoomBackOut() {
        clearHighlight();
        if (courseBounds) {
            map.flyToBounds(courseBounds, { padding: [80, 80], maxZoom: 11, duration: 0.8 });
        }
        isZoomedIn = false;
        zoomOutBtn.style.display = 'none';
    }

    function showLegInfo(legNum) {
        const legData = legs.find(l => l.leg === legNum);
        const completed = completedMap[legNum];
        const isCompleted = !!completed;
        const coords = getLegCoords(legNum);

        // Clear previous highlight and add new one
        clearHighlight();

        if (coords && coords.length > 0) {
            // Bright highlight outline behind the selected leg
            const hlOuter = L.polyline(coords, {
                color: '#ffffff',
                weight: 18,
                opacity: 0.6,
                lineCap: 'round',
                lineJoin: 'round',
                interactive: false,
                className: 'leg-highlight'
            }).addTo(map);

            const hlInner = L.polyline(coords, {
                color: isCompleted ? '#ffdd00' : '#00d4ff',
                weight: 11,
                opacity: 0.9,
                lineCap: 'round',
                lineJoin: 'round',
                interactive: false
            }).addTo(map);

            highlightLayers.push(hlOuter, hlInner);

            // Zoom to this leg - adjust padding based on screen size
            const legBounds = L.latLngBounds(coords);
            const isMobile = window.innerWidth <= 768;
            const padOpts = isMobile
                ? { padding: [60, 30, 30, 30], maxZoom: 14, duration: 0.6 }
                : { padding: [100, 380, 100, 100], maxZoom: 14, duration: 0.6 };
            map.flyToBounds(legBounds, padOpts);
            isZoomedIn = true;
            zoomOutBtn.style.display = 'block';
        }

        // Build panel content
        let html = '';

        if (completed) {
            html += `<div class="completed-badge">✓ Completed in ${completed.year}</div>`;
        } else {
            html += `<div class="not-completed-badge">○ Not yet run</div>`;
        }

        html += `<div class="leg-number">Leg ${legNum} • Runner #${legData.runner}</div>`;
        html += `<div class="leg-title">${legData.description}</div>`;
        html += `<div class="stats-row">`;
        html += `<div class="stat-chip"><span class="label">Dist</span><span class="value">${legData.miles} mi</span></div>`;
        html += `<div class="stat-chip"><span class="label">Diff</span><span class="value"><span class="rating-badge rating-${legData.rating}">${ratingLabels[legData.rating]}</span></span></div>`;

        if (completed) {
            html += `<div class="stat-chip"><span class="label">Pace</span><span class="value pace">${completed.pace}</span></div>`;
        }

        html += `</div>`;

        // Elevation profile
        if (typeof legElevations !== 'undefined' && legElevations[legNum]) {
            const elev = legElevations[legNum];
            const minElev = Math.min(...elev);
            const maxElev = Math.max(...elev);
            const gainFt = Math.round((maxElev - elev[0]) * 3.281);
            const elevChangeFt = Math.round((elev[elev.length - 1] - elev[0]) * 3.281);

            html += `<div class="elevation-container">`;
            html += `<div class="elevation-label">Elevation Profile</div>`;
            html += `<div class="elevation-chart"><canvas id="elev-canvas"></canvas></div>`;
            html += `<div class="elevation-stats">`;
            html += `<span>${Math.round(minElev * 3.281).toLocaleString()} ft</span>`;
            html += `<span>↑ ${Math.round((maxElev - minElev) * 3.281).toLocaleString()} ft gain</span>`;
            html += `<span>${Math.round(maxElev * 3.281).toLocaleString()} ft</span>`;
            html += `</div>`;
            html += `</div>`;
        }

        panelContent.innerHTML = html;
        infoPanel.classList.add('visible');

        // Draw elevation chart after DOM update
        if (typeof legElevations !== 'undefined' && legElevations[legNum]) {
            requestAnimationFrame(() => drawElevationChart(legNum));
        }
    }

    function drawElevationChart(legNum) {
        const canvas = document.getElementById('elev-canvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const elev = legElevations[legNum];
        const isCompleted = !!completedMap[legNum];

        // Set canvas resolution
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * 2;
        canvas.height = rect.height * 2;
        ctx.scale(2, 2);

        const w = rect.width;
        const h = rect.height;
        const padding = 2;

        const minE = Math.min(...elev);
        const maxE = Math.max(...elev);
        const range = maxE - minE || 1;

        // Draw filled area
        ctx.beginPath();
        ctx.moveTo(padding, h - padding);

        for (let i = 0; i < elev.length; i++) {
            const x = padding + (i / (elev.length - 1)) * (w - 2 * padding);
            const y = h - padding - ((elev[i] - minE) / range) * (h - 2 * padding);
            ctx.lineTo(x, y);
        }

        ctx.lineTo(w - padding, h - padding);
        ctx.closePath();

        // Gradient fill
        const gradient = ctx.createLinearGradient(0, 0, 0, h);
        if (isCompleted) {
            gradient.addColorStop(0, 'rgba(71, 170, 67, 0.4)');
            gradient.addColorStop(1, 'rgba(71, 170, 67, 0.05)');
        } else {
            gradient.addColorStop(0, 'rgba(200, 214, 229, 0.3)');
            gradient.addColorStop(1, 'rgba(200, 214, 229, 0.05)');
        }
        ctx.fillStyle = gradient;
        ctx.fill();

        // Draw line on top
        ctx.beginPath();
        for (let i = 0; i < elev.length; i++) {
            const x = padding + (i / (elev.length - 1)) * (w - 2 * padding);
            const y = h - padding - ((elev[i] - minE) / range) * (h - 2 * padding);
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.strokeStyle = isCompleted ? '#5cd658' : '#a0b4c8';
        ctx.lineWidth = 1.5;
        ctx.stroke();
    }

    // ============================================================
    // PROGRESS BAR
    // ============================================================
    const count = completedLegs.length;
    document.getElementById('progress-count').textContent = count;
    document.getElementById('progress-bar-fill').style.width = `${(count / 36) * 100}%`;
    </script>
</body>
</html>
